<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Chấm Công ESP32-CAM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .controls {
            padding: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            background: #f8f9fa;
        }

        .btn {
            padding: 15px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(56, 239, 125, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .status-bar {
            padding: 20px 30px;
            background: #fff3cd;
            border-left: 5px solid #ffc107;
            margin: 0 30px;
            border-radius: 10px;
            display: none;
        }

        .status-bar.active {
            display: block;
        }

        .status-bar.success {
            background: #d4edda;
            border-color: #28a745;
        }

        .status-bar.error {
            background: #f8d7da;
            border-color: #dc3545;
        }

        .table-container {
            padding: 30px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: bold;
            font-size: 1.1em;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #dee2e6;
        }

        tbody tr:hover {
            background: #f8f9fa;
        }

        .badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .badge-success {
            background: #d4edda;
            color: #155724;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .camera-status {
            padding: 20px 30px;
            margin: 0 30px 20px;
            background: #e7f3ff;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-indicator {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background: #28a745;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            
            .controls {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔐 Hệ Thống Chấm Công</h1>
            <p>ESP32-CAM Face Recognition System</p>
        </div>

        <div class="camera-status">
            <div class="status-indicator"></div>
            <span><strong>Hệ thống:</strong> <span id="systemStatus">Đang chờ kết nối...</span></span>
        </div>

        <div class="controls">
            <button class="btn btn-primary" id="startBtn" onclick="startAttendance()">
                📷 Bắt Đầu Chấm Công
            </button>
            <button class="btn btn-success" id="refreshBtn" onclick="loadAttendance()">
                🔄 Tải Lại Dữ Liệu
            </button>
        </div>

        <div class="status-bar" id="statusBar"></div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Đang tải dữ liệu...</p>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Tên</th>
                        <th>Ngày</th>
                        <th>Giờ</th>
                        <th>Trạng Thái</th>
                    </tr>
                </thead>
                <tbody id="attendanceTable">
                    <tr>
                        <td colspan="5" style="text-align: center; padding: 40px;">
                            Chưa có dữ liệu chấm công
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // CẤU HÌNH API
        const API_URL = 'https://hurtfully-untarred-londa.ngrok-free.dev';  // URL Flask API chạy local
        const GOOGLE_SHEET_URL = 'YOUR_GOOGLE_SHEET_JSON_URL';  // URL để lấy data từ Google Sheets

        // Hiển thị thông báo
        function showStatus(message, type = 'info') {
            const statusBar = document.getElementById('statusBar');
            statusBar.className = `status-bar active ${type}`;
            statusBar.textContent = message;
            
            setTimeout(() => {
                statusBar.classList.remove('active');
            }, 5000);
        }

        // Bắt đầu chấm công
        async function startAttendance() {
            const btn = document.getElementById('startBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Đang khởi động...';
            
            try {
                const response = await fetch(`${API_URL}/start`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'ngrok-skip-browser-warning': 'true'
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showStatus('✅ Hệ thống nhận diện đã khởi động! Vui lòng đứng trước camera.', 'success');
                    document.getElementById('systemStatus').textContent = 'Đang nhận diện...';
                    
                    // Tự động tải lại sau 3 giây
                    setTimeout(() => {
                        loadAttendance();
                    }, 3000);
                } else {
                    showStatus('❌ Lỗi: ' + data.message, 'error');
                }
            } catch (error) {
                showStatus('❌ Không thể kết nối đến server Python. Hãy đảm bảo Flask API đang chạy!', 'error');
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.textContent = '📷 Bắt Đầu Chấm Công';
            }
        }

        // Tải dữ liệu chấm công từ Google Sheets
        async function loadAttendance() {
            const loading = document.getElementById('loading');
            const table = document.getElementById('attendanceTable');
            
            loading.classList.add('active');
            
            try {
                // Gọi API để lấy dữ liệu
                const response = await fetch(`${API_URL}/attendance`, {
                    headers: {
                        'ngrok-skip-browser-warning': 'true'  // ← THÊM DÒNG NÀY
                    }
                });
                const data = await response.json();
                
                if (data.success && data.records.length > 0) {
                    table.innerHTML = '';
                    
                    data.records.forEach(record => {
                        const row = `
                            <tr>
                                <td>${record.id}</td>
                                <td>${record.name}</td>
                                <td>${record.date}</td>
                                <td>${record.time}</td>
                                <td><span class="badge badge-success">${record.status}</span></td>
                            </tr>
                        `;
                        table.innerHTML += row;
                    });
                    
                    document.getElementById('systemStatus').textContent = 'Sẵn sàng';
                } else {
                    table.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 40px;">Chưa có dữ liệu chấm công</td></tr>';
                }
            } catch (error) {
                console.error('Lỗi tải dữ liệu:', error);
                showStatus('❌ Không thể tải dữ liệu từ server', 'error');
            } finally {
                loading.classList.remove('active');
            }
        }

        // Tự động tải dữ liệu khi vào trang
        window.onload = () => {
            loadAttendance();
            // Tự động refresh mỗi 30 giây
            setInterval(loadAttendance, 30000);
        };
    </script>
</body>

</html>
